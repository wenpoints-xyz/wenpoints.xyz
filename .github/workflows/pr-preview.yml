name: PR preview

# Actions-native production Pages can't also serve branch subdirectories, so
# previews use raw.githack.com — it serves any PR branch's files live from a
# CDN with zero deploy. Instant, and it can never get stuck in "building".
on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const ref = context.payload.pull_request.head.ref;
            const repo = context.payload.repository.full_name;
            const url = `https://raw.githack.com/${repo}/${ref}/site/index.html`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n🔎 **Live preview:** ${url}\n\nServed from this PR's branch via raw.githack.com — updates on every push, no deploy step.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
